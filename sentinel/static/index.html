<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SENTINEL PRO</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="/static/style.css?v=20260406f" />
</head>
<body class="logged-out">
<div id="login-screen" class="login-screen">
  <div class="login-card card">
    <div class="brand login-brand">
      <div class="brand-dot"></div>
      <div>
        <h1>SENTINEL PRO</h1>
        <p>fail2ban security operations panel</p>
      </div>
    </div>
    <h3>Login</h3>
    <div class="row" style="grid-template-columns:1fr">
      <input id="u" placeholder="username" value="admin">
      <input id="p" placeholder="password" type="password">
      <button class="action" id="l">Sign in</button>
    </div>
  </div>
</div>

<div class="app-shell auth-only">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-dot"></div>
      <div>
        <h1>SENTINEL PRO</h1>
        <p>fail2ban control panel</p>
      </div>
    </div>

    <nav class="nav">
      <button data-view="dashboard" class="nav-btn active">Dashboard</button>
      <button data-view="jails" class="nav-btn">Jails</button>
      <button data-view="bans" class="nav-btn">Ban / Unban</button>
      <button data-view="whitelist" class="nav-btn">Whitelist</button>
      <button data-view="config" class="nav-btn">Config Editor</button>
      <button data-view="logs" class="nav-btn">Log Analyzer</button>
      <button data-view="audit" class="nav-btn">Audit Log</button>
      <button data-view="sessions" class="nav-btn">Sessions</button>
      <button data-view="health" class="nav-btn">System Health</button>
    </nav>

    <button id="logout" class="logout-btn">Logout</button>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <span class="badge mono" id="who">guest</span>
      </div>
      <div class="topbar-right">
        <span class="badge" id="ws">WS: disconnected</span>
      </div>
    </header>

    <section id="view" class="content"></section>
  </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="/static/app.js?v=20260406f"></script>
</body>
</html>
